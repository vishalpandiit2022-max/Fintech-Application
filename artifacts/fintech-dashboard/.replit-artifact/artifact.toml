kind = "web"
previewPath = "/"
title = "FinTech Personal Finance Dashboard"
version = "1.0.0"
id = "artifacts/fintech-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25820
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fintech-dashboard run dev"

[services.env]
PORT = "25820"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fintech-dashboard", "run", "build"]
publicDir = "artifacts/fintech-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
