<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Advisory – FinTech</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div class="mobile-header">
        <button class="mobile-toggle" id="mobileToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <span class="mobile-brand">FinTech</span>
      </div>
      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <h1>Investment Advisory</h1>
            <p>Fill in your profile to receive a personalised investment plan.</p>
          </div>
        </div>

        <div class="advisory-grid">
          <!-- Left: Profile Form -->
          <div class="card">
            <div class="card-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
              Your Financial Profile
            </div>
            <form id="advisoryForm">
              <div class="form-group">
                <label class="form-label" for="totalSavings">Total Savings ($)</label>
                <input class="form-control" id="totalSavings" type="number" min="0" step="0.01" placeholder="e.g. 12 000">
              </div>
              <div class="form-group">
                <label class="form-label" for="financialGoals">Financial Goals</label>
                <textarea class="form-control" id="financialGoals" rows="3" placeholder="e.g. Buy a house, retire at 55, fund children's education…"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Risk Tolerance</label>
                <div class="risk-btns">
                  <button type="button" class="risk-btn" data-risk="Low">Low</button>
                  <button type="button" class="risk-btn active-medium" data-risk="Medium">Medium</button>
                  <button type="button" class="risk-btn" data-risk="High">High</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="horizon">Investment Time Horizon</label>
                <select class="form-control" id="horizon">
                  <option value="">Select a time horizon…</option>
                  <option>Less than 1 year</option>
                  <option>1–3 years</option>
                  <option>3–5 years</option>
                  <option>5–10 years</option>
                  <option>10+ years</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="generateBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                Get My Investment Plan
              </button>
            </form>
          </div>

          <!-- Right: Personalized Plan -->
          <div class="card" style="min-height:420px;display:flex;flex-direction:column">
            <div class="card-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 7-7.5 7.5-4-4L2 18"/><path d="M16 7h6v6"/></svg>
              Your Personalized Plan
            </div>
            <div id="planContainer" style="flex:1;display:flex;flex-direction:column">
              <div class="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div class="empty-icon">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                </div>
                <h3 style="font-size:1rem">No plan yet</h3>
                <p>Your plan will appear here once you fill out your profile.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/advisory.js"></script>
</body>
</html>
