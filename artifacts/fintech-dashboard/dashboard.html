<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – FinTech</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div class="mobile-header">
        <button class="mobile-toggle" id="mobileToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <span class="mobile-brand">FinTech</span>
      </div>
      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <h1>Dashboard</h1>
            <p>Your financial overview at a glance.</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="skeleton" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div>
            <div class="skeleton" style="width:60%;height:10px;margin-bottom:8px;border-radius:4px"></div>
            <div class="skeleton" style="width:80%;height:22px;border-radius:6px"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div>
            <div class="skeleton" style="width:60%;height:10px;margin-bottom:8px;border-radius:4px"></div>
            <div class="skeleton" style="width:80%;height:22px;border-radius:6px"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div>
            <div class="skeleton" style="width:60%;height:10px;margin-bottom:8px;border-radius:4px"></div>
            <div class="skeleton" style="width:80%;height:22px;border-radius:6px"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton" style="width:38px;height:38px;border-radius:10px;margin-bottom:14px"></div>
            <div class="skeleton" style="width:60%;height:10px;margin-bottom:8px;border-radius:4px"></div>
            <div class="skeleton" style="width:80%;height:22px;border-radius:6px"></div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start">
          <!-- Recent Expenses -->
          <div class="card">
            <div class="card-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg>
              Recent Expenses
            </div>
            <div id="recentTable">
              <div class="skeleton" style="height:200px;border-radius:8px"></div>
            </div>
          </div>
          <!-- Chart -->
          <div class="card">
            <div class="card-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
              Spending Breakdown
            </div>
            <div style="position:relative;height:220px;display:flex;align-items:center;justify-content:center">
              <canvas id="spendingChart"></canvas>
              <p id="chartEmpty" style="display:none;color:var(--muted);font-size:.875rem">No expenses yet.</p>
            </div>
          </div>
        </div>
        <style>@media(max-width:900px){div[style*="grid-template-columns:1fr 340px"]{grid-template-columns:1fr!important}}</style>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
