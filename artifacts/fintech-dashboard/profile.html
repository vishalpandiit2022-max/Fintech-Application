<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – FinTech</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div class="mobile-header">
        <button class="mobile-toggle" id="mobileToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <span class="mobile-brand">FinTech</span>
      </div>
      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <h1>Profile</h1>
            <p>Manage your account information.</p>
          </div>
        </div>

        <div style="max-width:600px">
          <!-- User Info -->
          <div class="card" style="margin-bottom:20px">
            <div class="card-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
              Account Details
            </div>
            <div id="profileAvatar" style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
              <div class="avatar" id="avatarCircle" style="width:52px;height:52px;font-size:1.25rem">?</div>
              <div>
                <div id="profileName" style="font-weight:700;font-size:1.05rem">—</div>
                <div id="profileEmail" style="color:var(--muted);font-size:.875rem">—</div>
              </div>
            </div>
            <div class="profile-info-grid">
              <div class="profile-info-item">
                <div class="profile-info-label">Full Name</div>
                <div class="profile-info-value" id="infoName">—</div>
              </div>
              <div class="profile-info-item">
                <div class="profile-info-label">Email Address</div>
                <div class="profile-info-value" id="infoEmail">—</div>
              </div>
              <div class="profile-info-item" style="grid-column:1/-1">
                <div class="profile-info-label">Monthly Salary</div>
                <div class="profile-info-value" id="infoSalary">—</div>
              </div>
            </div>
          </div>

          <!-- Update Salary -->
          <div class="card">
            <div class="card-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Update Monthly Salary
            </div>
            <div id="salaryAlert"></div>
            <form id="salaryForm" style="display:flex;gap:12px;align-items:flex-end">
              <div class="form-group" style="flex:1;margin-bottom:0">
                <label class="form-label" for="newSalary">New Monthly Salary ($)</label>
                <input class="form-control" id="newSalary" type="number" min="0" step="0.01" placeholder="e.g. 5000" required>
              </div>
              <button class="btn btn-primary" type="submit" id="salaryBtn">Update</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
