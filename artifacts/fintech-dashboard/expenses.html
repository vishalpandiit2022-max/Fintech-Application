<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses – FinTech</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div class="mobile-header">
        <button class="mobile-toggle" id="mobileToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <span class="mobile-brand">FinTech</span>
      </div>
      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <h1>Expenses</h1>
            <p>Track and manage your spending.</p>
          </div>
        </div>

        <!-- Add Expense Form -->
        <div class="card" style="margin-bottom:24px">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
            Add Expense
          </div>
          <div id="formAlert"></div>
          <form id="expenseForm">
            <div class="form-row-3">
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="desc">Description</label>
                <input class="form-control" id="desc" type="text" placeholder="e.g. Grocery run" required>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="cat">Category</label>
                <select class="form-control" id="cat" required>
                  <option value="">Select category…</option>
                  <option>Food</option>
                  <option>Transport</option>
                  <option>Shopping</option>
                  <option>Bills</option>
                  <option>Entertainment</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="amount">Amount ($)</label>
                <input class="form-control" id="amount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
              </div>
            </div>
            <div style="margin-top:14px;display:flex;gap:12px;align-items:flex-end">
              <div class="form-group" style="margin-bottom:0;flex:1">
                <label class="form-label" for="date">Date</label>
                <input class="form-control" id="date" type="date" required>
              </div>
              <button class="btn btn-primary" type="submit" id="addBtn" style="flex-shrink:0">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                Add Expense
              </button>
            </div>
          </form>
        </div>

        <!-- Expenses Table -->
        <div class="card">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/></svg>
            All Expenses
          </div>
          <div id="expensesTable">
            <div class="skeleton" style="height:200px;border-radius:8px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/expenses.js"></script>
</body>
</html>
