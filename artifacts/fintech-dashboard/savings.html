<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals – FinTech</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div class="mobile-header">
        <button class="mobile-toggle" id="mobileToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <span class="mobile-brand">FinTech</span>
      </div>
      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <h1>Savings Goals</h1>
            <p>Plan for your future with structured targets.</p>
          </div>
          <button class="btn btn-primary" id="toggleFormBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            New Goal
          </button>
        </div>

        <!-- Add Goal Form (hidden by default) -->
        <div class="card" id="goalFormCard" style="display:none;margin-bottom:24px">
          <div class="card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Define Your Target
          </div>
          <div id="goalAlert"></div>
          <form id="goalForm">
            <div class="form-row-3">
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="goalName">Goal Name</label>
                <input class="form-control" id="goalName" type="text" placeholder="e.g. Vacation Fund" required>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="targetAmount">Target Amount (₹)</label>
                <input class="form-control" id="targetAmount" type="number" min="1" step="1" placeholder="5000" required>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label" for="months">Months to Achieve</label>
                <input class="form-control" id="months" type="number" min="1" step="1" placeholder="12" required>
              </div>
            </div>
            <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
              <button type="button" class="btn btn-secondary" id="cancelFormBtn">Cancel</button>
              <button type="submit" class="btn btn-primary" id="createGoalBtn">Create Goal</button>
            </div>
          </form>
        </div>

        <!-- Goals List -->
        <div id="goalsContainer">
          <div class="skeleton" style="height:200px;border-radius:14px"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/savings.js"></script>
</body>
</html>
